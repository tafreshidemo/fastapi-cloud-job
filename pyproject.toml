[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "B",
    "UP",
    "N",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
filterwarnings = [
    "ignore:Using `httpx` with `starlette\\.testclient` is deprecated; install `httpx2` instead\\.:Warning",
]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_configs = true
plugins = []
exclude = [
    "^alembic/",
]
